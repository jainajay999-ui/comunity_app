<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="ljs_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="ljs_icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Loyana Samaj">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyana Jain Samaj Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-maroon-dark: #FF3939;
            --card-maroon-mid: #B4182D;
            --text-gold-main: #f0c977;
            --gold-shine: #fff5d7;
            --emboss-highlight: rgba(255, 255, 255, 0.3);
            --emboss-shadow: rgba(0, 0, 0, 0.6);
            --box-width: 150px;
            --box-height: 85px;
        }

        body {
            background-color: #1a1a1a;
            color: var(--text-gold-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        .phone-frame {
            width: 360px;
            height: 720px;
            background: linear-gradient(135deg, #9F0000 0%, #2a0000 100%);
            border: 12px solid #222;
            border-radius: 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen-active { display: flex; }

        .embossed {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            font-weight: 900;
            filter: drop-shadow(1px 1px 0px var(--emboss-highlight)) 
                    drop-shadow(-1px -1px 1px var(--emboss-shadow));
            background-size: 200% auto;
            animation: sheen 24s linear infinite;
        }

        @keyframes sheen {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        #screen-login {
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: url('https://www.transparenttextures.com/patterns/black-linen.png'), 
                        linear-gradient(180deg, #9F0000 50%, #5a0000 100%);
            box-sizing: border-box;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px solid #4a0000;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-gold-main);
            box-sizing: border-box;
        }

        .btn-gold {
            background: linear-gradient(180deg, #f0c977 0%, #b08d40 100%);
            color: #3a0000;
            border: none;
            border-radius: 8px;
            padding: 15px 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #8d702e;
        }

        .grid-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 15px;
            justify-content: center;
        }

        .square-card {
            width: var(--box-width);
            height: var(--box-height);
            background-color: var(--card-maroon-mid);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 2px 2px 4px var(--emboss-highlight);
        }

        .member-card {
            background: var(--card-maroon-mid);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(240, 201, 119, 0.2);
        }

        .photo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid var(--text-gold-main);
            flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .slider-wrapper {
            flex: 1;
            position: relative;
            margin: 0 20px 20px;
            border-radius: 15px;
            overflow: hidden;
            background: #2a0000;
        }

        .nav-bar { background: #4a0000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(240, 201, 119, 0.3); }
        .nav-item { color: #8d702e; font-size: 0.7rem; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-frame">
    
    <div id="screen-login" class="app-screen screen-active">
        <div class="embossed" style="font-size: 1.8rem;">Loyana Jain Samaj</div>
        <div style="margin-bottom: 40px; color: #d4af37;">Member Access portal</div>
        <input type="text" id="family-id" class="login-input" value="LJS101">
        <input type="password" id="login-pin" class="login-input" value="1234">
        <button class="btn-gold" onclick="navigateTo('screen-home')">Login</button>
    </div>

    <div id="screen-home" class="app-screen">
        <div style="text-align: center; padding: 25px 0;">
            <div class="embossed" style="font-size: 1.4rem;">Loyana Jain Samaj</div>
        </div>

        <div class="grid-container">
            <div class="square-card" onclick="navigateTo('screen-setup')"><i class="fas fa-users-cog" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">My Family</span></div>
            <div class="square-card" onclick="navigateTo('screen-directory')"><i class="fas fa-address-book" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">Directory</span></div>
            <div class="square-card"><i class="fas fa-calendar-alt" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">Events</span></div>
            <div class="square-card"><i class="fas fa-newspaper" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">News</span></div>
            <div class="square-card"><i class="fas fa-images" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">Gallery</span></div>
            <div class="square-card" onclick="navigateTo('screen-directory')"><i class="fas fa-users" style="font-size: 1.8rem;"></i><span class="embossed" style="font-size: 0.6rem; margin-top:5px;">Members</span></div>
        </div>

        <div class="slider-wrapper">
             <div style="display:flex; height:100%; align-items:center; justify-content:center; opacity:0.2"><i class="fas fa-images fa-3x"></i></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item" onclick="navigateTo('screen-home')"><i class="fas fa-home"></i><br>Home</div>
            <div class="nav-item"><i class="fas fa-comment-alt"></i><br>Chat</div>
            <div class="nav-item"><i class="fas fa-bell"></i><br>Notifs</div>
            <div class="nav-item" onclick="navigateTo('screen-setup')"><i class="fas fa-user-circle"></i><br>Profile</div>
        </div>
    </div>

    <div id="screen-setup" class="app-screen">
        <div style="padding: 20px; border-bottom: 1px solid gold; display: flex; align-items: center;">
            <i class="fas fa-arrow-left" onclick="navigateTo('screen-home')" style="cursor:pointer"></i>
            <span class="embossed" style="margin-left: 20px; font-size: 1rem;">Family Setup</span>
        </div>
        <div id="setup-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding: 15px; background: rgba(0,0,0,0.4);">
            <div id="role-hint" style="font-size: 0.7rem; color: gold; margin-bottom: 5px;">ADDING: HEAD OF FAMILY</div>
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="photo-circle" onclick="document.getElementById('m-photo').click()">
                    <img id="photo-preview" src="" style="display:none">
                    <i id="photo-icon" class="fas fa-camera"></i>
                </div>
                <input type="file" id="m-photo" style="display:none" accept="image/*" onchange="previewFile(this)">
                <span style="font-size:0.7rem; margin-left:10px;">Tap icon to add photo</span>
            </div>
            <input type="text" id="m-name" class="login-input" placeholder="Full Name">
            <input type="text" id="m-phone" class="login-input" placeholder="Mobile Number">
            <input type="text" id="m-edu" class="login-input" placeholder="Education">
            <input type="text" id="m-place" class="login-input" placeholder="Place (e.g. Borivali)">
            <button class="btn-gold" id="save-btn" style="width: 100%;" onclick="uploadMember()">Save Member</button>
        </div>
    </div>

    <div id="screen-directory" class="app-screen">
        <div style="padding: 20px; border-bottom: 1px solid gold;">
            <i class="fas fa-arrow-left" onclick="navigateTo('screen-home')" style="cursor:pointer"></i>
            <span class="embossed" style="margin-left: 20px; font-size: 1rem;">Community Directory</span>
        </div>
        <div id="global-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
    </div>

</div>

<script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxKlBK9u2Ne3MQ4Nnylb_149Fgfvf4EYkfDP1qGZffy2x61fQErlLd49xxvk__OyXJb/exec"; 

    let masterFamily = []; 
    let currentPhoto = "";

    function navigateTo(id) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        if(id === 'screen-directory') fetchCommunity();
    }

    function previewFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            currentPhoto = e.target.result;
            document.getElementById('photo-preview').src = e.target.result;
            document.getElementById('photo-preview').style.display = 'block';
            document.getElementById('photo-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function uploadMember() {
        const btn = document.getElementById('save-btn');
        const name = document.getElementById('m-name').value;
        const phone = document.getElementById('m-phone').value;
        const edu = document.getElementById('m-edu').value;
        const placeInput = document.getElementById('m-place');

        if(!name) return alert("Name is required");
        btn.innerText = "Saving...";
        btn.disabled = true;

        const isHead = masterFamily.length === 0;
        const payload = {
            name: name,
            phone: phone,
            education: edu,
            place: isHead ? placeInput.value : (masterFamily[0] ? masterFamily[0].place : ""),
            role: isHead ? "Head" : "Member",
            photo: currentPhoto
        };

        try {
            await fetch(DATABASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            masterFamily.push(payload);
            renderSetup();
            
            // Clear Form
            document.getElementById('m-name').value = '';
            document.getElementById('m-phone').value = '';
            document.getElementById('m-edu').value = '';
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('photo-icon').style.display = 'block';
            currentPhoto = "";

            if(masterFamily.length >= 1) {
                placeInput.style.display = 'none';
                document.getElementById('role-hint').innerText = "ADDING: FAMILY MEMBER";
            }
        } catch (e) { alert("Check Script URL"); }
        btn.innerText = "Save Member";
        btn.disabled = false;
    }

    function renderSetup() {
        const list = document.getElementById('setup-list');
        list.innerHTML = '';
        masterFamily.forEach((m) => {
            list.innerHTML += `
                <div class="member-card">
                    <div class="photo-circle">${m.photo ? `<img src="${m.photo}">` : `<i class="fas fa-user"></i>`}</div>
                    <div style="margin-left:15px;"><b style="color:#fff">${m.name}</b><br><small>${m.role}</small></div>
                </div>`;
        });
    }

    async function fetchCommunity() {
        const list = document.getElementById('global-list');
        list.innerHTML = '<div style="text-align:center; opacity:0.5">Syncing data...</div>';
        try {
            const resp = await fetch(DATABASE_URL);
            const data = await resp.json();
            list.innerHTML = '';
            data.forEach(row => {
                list.innerHTML += `
                    <div class="member-card">
                        <div class="photo-circle">${row[5] ? `<img src="${row[5]}">` : `<i class="fas fa-user"></i>`}</div>
                        <div style="flex:1">
                            <div style="color:white; font-size:0.9rem"><b>${row[0]}</b></div>
                            <div style="font-size:0.7rem; color:gold">${row[3]} | ${row[1]}</div>
                            <div style="font-size:0.6rem; opacity:0.8">${row[4]} | ${row[2]}</div>
                        </div>
                    </div>`;
            });
        } catch (e) { list.innerHTML = '<div style="text-align:center">Tap Directory again to refresh.</div>'; }
    }
</script>
</body>
</html>
