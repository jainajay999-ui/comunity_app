<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="ljs_logo.png" type="image/png" sizes="144x144">
    <link rel="apple-touch-icon" href="ljs_logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Loyana Samaj">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyana Jain Samaj Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-maroon-dark: #FF3939;
            --card-maroon-mid: #B4182D;
            --text-gold-main: #f0c977;
            --gold-shine: #fff5d7;
            --emboss-highlight: rgba(255, 255, 255, 0.3);
            --emboss-shadow: rgba(0, 0, 0, 0.6);
            --box-width: 150px;
            --box-height: 85px;
        }

        body {
            background-color: #1a1a1a;
            color: var(--text-gold-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        .phone-frame {
            width: 360px;
            height: 720px;
            background: linear-gradient(135deg, #9F0000 0%, #2a0000 100%);
            border: 12px solid #222;
            border-radius: 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen-active { display: flex; }

        /* --- GOLD EMBOSSED TEXT WITH SHEEN --- */
        .embossed {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            font-weight: 900;
            position: relative;
            display: inline-block;
            filter: drop-shadow(1px 1px 0px var(--emboss-highlight)) 
                    drop-shadow(-1px -1px 1px var(--emboss-shadow));
            background-size: 200% auto;
            animation: sheen 24s linear infinite;
        }

        @keyframes sheen {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* --- LOGIN CENTERED --- */
        #screen-login {
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: url('https://www.transparenttextures.com/patterns/black-linen.png'), 
                        linear-gradient(180deg, #9F0000 50%, #5a0000 100%);
            box-sizing: border-box;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px solid #4a0000;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-gold-main);
            box-sizing: border-box;
        }

        .btn-gold {
            background: linear-gradient(180deg, #f0c977 0%, #b08d40 100%);
            color: #3a0000;
            border: none;
            border-radius: 8px;
            padding: 15px 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #8d702e;
        }

        /* --- GRID --- */
        .grid-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 20px;
            justify-content: center;
        }

        .square-card {
            width: var(--box-width);
            height: var(--box-height);
            background-color: var(--card-maroon-mid);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 4px 4px 6px var(--emboss-highlight), 
                        inset -1px -1px 2px var(--emboss-shadow);
        }

        /* --- EDITABLE CARDS --- */
        .member-card {
            background: var(--card-maroon-mid);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(240, 201, 119, 0.2);
        }

        .editable-input {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            width: 100%;
            outline: none;
            font-family: sans-serif;
        }

        .photo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid var(--text-gold-main);
            flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .slider-wrapper {
            flex: 1;
            position: relative;
            margin: 0 20px 20px;
            border-radius: 15px;
            overflow: hidden;
            background: #2a0000;
        }
        .slider-container { display: flex; height: 100%; transition: transform 0.4s ease; }
        .slide { min-width: 100%; height: 100%; }

        .nav-bar { background: #4a0000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(240, 201, 119, 0.3); }
        .nav-item { color: #8d702e; font-size: 0.7rem; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-frame">
    
    <div id="screen-login" class="app-screen screen-active">
        <div class="embossed" style="font-size: 1.8rem;">Loyana Jain Samaj</div>
        <div style="margin-bottom: 40px; color: #d4af37;">Member Access portal</div>
        <input type="text" id="family-id" class="login-input" value="LJS101">
        <input type="password" id="login-pin" class="login-input" value="1234">
        <button class="btn-gold" onclick="navigateTo('screen-home')">Login</button>
    </div>

    <div id="screen-home" class="app-screen">
        <div style="text-align: center; padding: 25px 0;">
            <div class="embossed" style="font-size: 1.4rem;">Loyana Jain Samaj</div>
        </div>

        <div class="grid-container">
            <div class="square-card" onclick="navigateTo('screen-setup')"><i class="fas fa-users-cog" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">My Family</span></div>
            <div class="square-card"><i class="fas fa-address-book" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">Directory</span></div>
            <div class="square-card"><i class="fas fa-calendar-alt" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">Events</span></div>
            <div class="square-card"><i class="fas fa-newspaper" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">News</span></div>
            <div class="square-card"><i class="fas fa-images" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">Gallery</span></div>
            <div class="square-card" onclick="navigateTo('screen-directory')"><i class="fas fa-users" style="font-size: 2rem;"></i><span class="embossed" style="font-size: 0.7rem;">Members</span></div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-container" id="slider">
                <div class="slide" style="background:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-image" style="font-size:3rem; opacity:0.2"></i></div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item" onclick="navigateTo('screen-home')"><i class="fas fa-home"></i><br>Home</div>
            <div class="nav-item"><i class="fas fa-comment-alt"></i><br>Chat</div>
            <div class="nav-item"><i class="fas fa-bell"></i><br>Notifs</div>
            <div class="nav-item" onclick="navigateTo('screen-setup')"><i class="fas fa-user-circle"></i><br>Profile</div>
        </div>
    </div>

    <div id="screen-setup" class="app-screen">
        <div style="padding: 20px; border-bottom: 1px solid gold;">
            <i class="fas fa-arrow-left" onclick="navigateTo('screen-home')" style="cursor:pointer"></i>
            <span class="embossed" style="margin-left: 20px; font-size: 1rem;">Family Setup</span>
        </div>
        <div id="setup-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding: 15px; background: rgba(0,0,0,0.3);">
            <input type="text" id="m-name" class="login-input" placeholder="Full Name">
            <input type="date" id="m-dob" class="login-input">
            <button class="btn-gold" style="width: 100%;" onclick="addFamilyMember()">Add Member</button>
        </div>
    </div>

    <div id="screen-directory" class="app-screen">
        <div style="padding: 20px; border-bottom: 1px solid gold;">
            <i class="fas fa-arrow-left" onclick="navigateTo('screen-home')" style="cursor:pointer"></i>
            <span class="embossed" style="margin-left: 20px; font-size: 1rem;">Members</span>
        </div>
        <div id="heads-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
    </div>

</div>

<script>
    let masterFamily = []; 

    function navigateTo(id) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        if(id === 'screen-directory') renderHeads();
    }

    function addFamilyMember() {
        const name = document.getElementById('m-name').value;
        const dob = document.getElementById('m-dob').value;
        if(!name) return;
        const role = masterFamily.length === 0 ? "Head of Family" : `Member ${masterFamily.length}`;
        masterFamily.push({ name, dob, role, photo: null });
        renderSetup();
        document.getElementById('m-name').value = '';
        document.getElementById('m-dob').value = '';
    }

    function renderSetup() {
        const list = document.getElementById('setup-list');
        list.innerHTML = '';
        masterFamily.forEach((m, idx) => {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.innerHTML = `
                <div class="photo-circle" onclick="this.nextElementSibling.click()">
                    ${m.photo ? `<img src="${m.photo}">` : `<i class="fas fa-camera"></i>`}
                </div>
                <input type="file" style="display:none" onchange="uploadPhoto(this, ${idx})">
                <div style="margin-left:15px; flex-grow:1">
                    <input class="editable-input" value="${m.name}" onchange="masterFamily[${idx}].name=this.value">
                    <div style="color:#f0c977; font-size:0.7rem">${m.role}</div>
                    <input type="date" class="editable-input" style="font-size:0.8rem; color:#f0c977" value="${m.dob}" onchange="masterFamily[${idx}].dob=this.value">
                </div>`;
            list.appendChild(card);
        });
    }

    function uploadPhoto(input, idx) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                masterFamily[idx].photo = e.target.result;
                renderSetup();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function renderHeads() {
        const list = document.getElementById('heads-list');
        list.innerHTML = '';
        if(masterFamily.length > 0) {
            const head = masterFamily[0];
            const card = document.createElement('div');
            card.className = 'member-card';
            card.innerHTML = `
                <div class="photo-circle">${head.photo ? `<img src="${head.photo}">` : `<i class="fas fa-user"></i>`}</div>
                <div style="margin-left:15px;">
                    <div style="color:white; font-weight:bold">${head.name}</div>
                    <div style="color:#f0c977; font-size:0.8rem">Head of Family</div>
                </div>`;
            list.appendChild(card);
        }
    }
</script>
</body>
</html>
